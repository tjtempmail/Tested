name: Dumpyara and Device Tree Generation

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct URL to firmware ZIP file'
        required: true
        type: string
      device_codename:
        description: 'Device codename (e.g., X659B)'
        required: true
        default: 'X659B'
        type: string

jobs:
  dumpyara:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv git curl wget unzip

      - name: Setup and run dumpyara
        run: |
          mkdir ~/dumpyara
          cd ~/dumpyara
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          ./setup.sh
          wget -O firmware.zip "${{ github.event.inputs.firmware_url }}"
          ./dumpyara.sh firmware.zip

      - name: Generate device tree
        run: |
          pip3 install aospdtgen
          mkdir ~/dumpyara/deviceTree
          aospdtgen ~/dumpyara/working/* -o ~/dumpyara/deviceTree

      - name: Fix extract-files.py placeholder and run it
        run: |
          cd ~/dumpyara/deviceTree
          # Replace FULL-64 with actual codename
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' extract-files.py
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' setup-makefiles.sh 2>/dev/null || true
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' Android.bp 2>/dev/null || true
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' Android.mk 2>/dev/null || true
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' BoardConfig.mk 2>/dev/null || true
          sed -i 's/FULL-64/${{ github.event.inputs.device_codename }}/g' device.mk 2>/dev/null || true
          
          # Create vendor directory structure
          mkdir -p ~/android/lineage/vendor/infinix/${{ github.event.inputs.device_codename }}
          
          # Run extract-files.py
          python3 extract-files.py ~/dumpyara/working/*

      - name: Upload device tree
        uses: actions/upload-artifact@v4
        with:
          name: device-tree-${{ github.event.inputs.device_codename }}
          path: ~/dumpyara/deviceTree/

      - name: Upload vendor blobs
        uses: actions/upload-artifact@v4
        with:
          name: vendor-blobs-${{ github.event.inputs.device_codename }}
          path: ~/android/lineage/vendor/infinix/
          
