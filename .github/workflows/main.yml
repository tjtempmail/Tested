name: ROM Extract and Release

on:
  workflow_dispatch:
    inputs:
      stock_rom_url:
        description: 'Stock ROM URL'
        required: true
        default: 'https://archive.org/download/infinix-hot-10i-x659b-stock-rom-firmware/R2-Infinix-Hot-10i-X659B-14.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Stock ROM
        run: |
          mkdir -p ~/Downloads
          wget "${{ github.event.inputs.stock_rom_url }}" -O ~/Downloads/stockrom.zip

      - name: Setup Dumpyara
        run: |
          mkdir ~/dumpyara
          cd ~/dumpyara
          git clone https://github.com/AndroidDumps/dumpyara.git dumpyara-master
          cd dumpyara-master
          bash setup.sh

      - name: Extract Firmware
        run: |
          cd ~/dumpyara
          bash ~/dumpyara/dumpyara-master/dumpyara.sh ~/Downloads/stockrom.zip || true
          # Check if working directory was created (means dump succeeded)
          ls -la ~/dumpyara/working/

      - name: Install aospdtgen
        run: pip3 install aospdtgen

      - name: Generate Device Tree
        run: |
          mkdir -p ~/dumpyara/deviceTree
          cd ~/dumpyara/deviceTree
          # Find the actual extracted firmware directory
          FW_DIR=$(find ~/dumpyara/working -maxdepth 1 -type d | tail -1)
          aospdtgen "$FW_DIR" -o ~/dumpyara/deviceTree

      - name: Extract Vendor Files
        run: |
          cd ~/dumpyara/deviceTree
          # Find the actual extracted firmware directory
          FW_DIR=$(find ~/dumpyara/working -maxdepth 1 -type d | tail -1)
          bash extract-files.sh "$FW_DIR" || true

      - name: Package Release
        run: |
          cd ~
          tar czf release.tar.gz dumpyara/

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: rom-extracted
          path: ~/release.tar.gz
          
