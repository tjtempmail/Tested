name: Generate LineageOS Device Tree (Fixed & Stable)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      FIRMWARE_URL:
        description: 'Direct URL to firmware zip'
        required: true
      DEVICE_CODENAME:
        required: true
      BRAND:
        required: true
      MODEL:
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # ===============================
    # Install Dependencies
    # ===============================
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip git wget aria2 unzip \
          simg2img lz4 brotli p7zip-full erofs-utils \
          android-sdk-libsparse-utils

    # ===============================
    # Clone Tools
    # ===============================
    - name: Clone dumpyara
      run: |
        git clone https://github.com/sebaubuntu-python/dumpyara.git
        cd dumpyara
        pip install -e .
        cd ..

    - name: Clone aospdtgen
      run: |
        git clone https://github.com/sebaubuntu-python/aospdtgen.git
        cd aospdtgen
        pip install -e .
        cd ..

    # ===============================
    # Download Firmware
    # ===============================
    - name: Download firmware
      run: |
        aria2c -x16 -s16 -o firmware.zip "${{ github.event.inputs.FIRMWARE_URL }}"

    # ===============================
    # Extract partitions
    # ===============================
    - name: Extract partitions using dumpyara
      run: |
        mkdir dump
        python -m dumpyara firmware.zip -o dump/

    # ===============================
    # Generate Device Tree
    # ===============================
    - name: Generate device tree
      run: |
        mkdir device_tree
        python -m aospdtgen dump/ -o device_tree/

    # ===============================
    # Prepare Device Directory (FIXED)
    # ===============================
    - name: Prepare device directory
      run: |
        mkdir -p device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}
        cp -r device_tree/* device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}/

    # ===============================
    # Run REAL extract-files.py
    # ===============================
    - name: Run extract-files.py
      run: |
        cd device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}
        if [ -f extract-files.py ]; then
          python3 extract-files.py ../../../../dump
        else
          echo "No extract-files.py found"
        fi
        cd ../../../../

    # ===============================
    # CLEAN LARGE FILES (IMPORTANT)
    # ===============================
    - name: Cleanup dump and images
      run: |
        rm -rf dump
        find . -name "*.img" -delete || true
        find . -name "*.dat" -delete || true

    # ===============================
    # Package ONLY device tree (Safe size)
    # ===============================
    - name: Package device tree
      run: |
        mkdir final
        mv device final/

        cd final
        tar -czf ../lineage_${{ github.event.inputs.DEVICE_CODENAME }}_tree.tar.gz *
        cd ..

    # ===============================
    # Upload Release
    # ===============================
    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: lineage_${{ github.event.inputs.DEVICE_CODENAME }}_tree.tar.gz
        tag_name: dt_${{ github.run_id }}
        name: "LineageOS Tree - ${{ github.event.inputs.DEVICE_CODENAME }}"
        body: |
          Auto-generated device tree (SAFE SIZE)

          Device: ${{ github.event.inputs.MODEL }}
          Codename: ${{ github.event.inputs.DEVICE_CODENAME }}

          Generated using:
          - dumpyara
          - aospdtgen

          Included:
          - device tree
          - proprietary-files.txt
          - extract-files.py
          - BoardConfig.mk

          ⚠ Manual fixes still required:
          - Kernel source
          - SELinux policies
          - RIL / IMS
          - Camera
          - Audio
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
