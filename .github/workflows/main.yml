name: Unpack Vendor Boot Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL to vendor_boot.img'
        required: true
        default: 'https://archive.org/download/vendor_boot_202603/vendor_boot.img'
        type: string
      upload_artifacts:
        description: 'Upload unpacked contents as artifacts'
        required: true
        default: true
        type: boolean

jobs:
  unpack-vendor-boot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lz4 gzip cpio file unzip xz-utils

      - name: Download Android Image Kitchen
        run: |
          # Clone Android Image Kitchen which supports vendor_boot
          git clone --depth 1 https://github.com/osm0sis/Android-Image-Kitchen.git AIK
          cd AIK
          # Make scripts executable
          chmod +x unpackimg.sh repackimg.sh cleanup.sh

      - name: Download vendor_boot.img
        run: |
          URL="${{ github.event.inputs.image_url }}"
          echo "Downloading from: $URL"
          wget --progress=bar:force -O vendor_boot.img "$URL"
          ls -lh vendor_boot.img
          file vendor_boot.img

      - name: Unpack vendor_boot.img using AIK
        run: |
          # Copy image to AIK directory
          cp vendor_boot.img AIK/
          cd AIK
          
          # Unpack the image
          bash unpackimg.sh ./vendor_boot.img
          
          # Show results
          echo "AIK unpacking complete"
          ls -lah

      - name: Organize output
        run: |
          mkdir -p unpacked
          
          # Move AIK output to unpacked directory
          if [ -d "AIK/split_img" ]; then
            mv AIK/split_img unpacked/
          fi
          
          if [ -d "AIK/ramdisk" ]; then
            mv AIK/ramdisk unpacked/
          fi
          
          # Copy the original image
          cp vendor_boot.img unpacked/ || true
          
          echo "Contents organized:"
          ls -lah unpacked/
          
          # Show split_img contents if exists
          if [ -d "unpacked/split_img" ]; then
            echo -e "\nSplit image components:"
            ls -lah unpacked/split_img/
          fi

      - name: Extract ramdisk contents if present
        run: |
          if [ -f "unpacked/ramdisk.cpio.gz" ] || [ -f "unpacked/ramdisk.cpio" ]; then
            echo "Found ramdisk, extracting..."
            cd unpacked
            
            # Determine compression
            if [ -f "ramdisk.cpio.gz" ]; then
              gunzip -c ramdisk.cpio.gz > ramdisk.cpio || true
            fi
            
            if [ -f "ramdisk.cpio" ]; then
              mkdir -p ramdisk_extracted
              cd ramdisk_extracted
              cpio -idmv < ../ramdisk.cpio || true
              cd ..
            fi
          fi
          
          # Check AIK ramdisk directory
          if [ -d "unpacked/ramdisk" ]; then
            echo -e "\nAIK ramdisk directory contents:"
            ls -lah unpacked/ramdisk/ || true
          fi

      - name: Analyze image structure
        run: |
          echo "=== Vendor Boot Image Analysis ==="
          file vendor_boot.img
          
          echo -e "\n=== Hex Header (first 256 bytes) ==="
          xxd -l 256 vendor_boot.img | head -20
          
          echo -e "\n=== Directory Structure ==="
          find unpacked/ -type f -exec ls -lh {} \; 2>/dev/null | head -30

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-vendor-boot-${{ github.run_number }}
          path: unpacked/
          retention-days: 30
          if-no-files-found: warn
          
