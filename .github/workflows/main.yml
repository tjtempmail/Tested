name: Unpack Vendor Boot Image

on:
  # Temporary: Remove after testing, only for initial run
  push:
    branches:
      - '**'
  
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL to vendor_boot.img'
        required: true
        default: 'https://archive.org/download/vendor_boot_202603/vendor_boot.img'
        type: string
      upload_artifacts:
        description: 'Upload artifacts (yes/no)'
        required: true
        default: 'yes'
        type: string

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget file xxd lz4 gzip cpio

      - name: Download image
        run: |
          URL="${{ github.event.inputs.image_url || 'https://archive.org/download/vendor_boot_202603/vendor_boot.img' }}"
          wget -q --show-progress "$URL" -O vendor_boot.img
          ls -lh vendor_boot.img
          file vendor_boot.img
          xxd -l 16 vendor_boot.img

      - name: Unpack vendor_boot
        run: |
          mkdir -p unpacked
          
          # Check if sparse image
          MAGIC=$(xxd -p -l 4 vendor_boot.img)
          if [ "$MAGIC" = "3aff26ed" ]; then
            echo "Sparse image detected, converting..."
            simg2img vendor_boot.img vendor_boot.raw.img
            mv vendor_boot.raw.img vendor_boot.img
          fi
          
          # Manual extraction for VNDRBOOT format
          echo "Attempting manual extraction..."
          
          # Read header fields (little endian)
          read_le32() {
            local off=$1
            local hex=$(dd if=vendor_boot.img bs=1 skip=$off count=4 2>/dev/null | xxd -p)
            echo $((16#${hex:6:2}${hex:4:2}${hex:2:2}${hex:0:2}))
          }
          
          RAMDISK_SIZE=$(read_le32 16)
          PAGE_SIZE=$(read_le32 24)
          HEADER_VERSION=$(read_le32 28)
          DTB_SIZE=$(read_le32 2104)
          
          echo "Ramdisk: $RAMDISK_SIZE, Page: $PAGE_SIZE, Ver: $HEADER_VERSION, DTB: $DTB_SIZE"
          
          # Default page size if zero
          [ "$PAGE_SIZE" -eq 0 ] && PAGE_SIZE=4096
          
          HEADER_SIZE=2112
          [ "$HEADER_VERSION" -eq 4 ] && HEADER_SIZE=2124
          
          # Calculate aligned offset
          RAMDISK_OFFSET=$(( (HEADER_SIZE + PAGE_SIZE - 1) / PAGE_SIZE * PAGE_SIZE ))
          
          # Extract ramdisk if valid size
          if [ $RAMDISK_SIZE -gt 0 ] && [ $RAMDISK_SIZE -lt 67108864 ]; then
            dd if=vendor_boot.img bs=1 skip=$RAMDISK_OFFSET count=$RAMDISK_SIZE of=unpacked/vendor_ramdisk 2>/dev/null
            
            # Decompress
            if file unpacked/vendor_ramdisk | grep -q gzip; then
              mv unpacked/vendor_ramdisk unpacked/vendor_ramdisk.gz
              gunzip -c unpacked/vendor_ramdisk.gz > unpacked/vendor_ramdisk.cpio 2>/dev/null || true
            elif file unpacked/vendor_ramdisk | grep -q LZ4; then
              mv unpacked/vendor_ramdisk unpacked/vendor_ramdisk.lz4
              lz4 -d unpacked/vendor_ramdisk.lz4 unpacked/vendor_ramdisk.cpio 2>/dev/null || true
            fi
            
            # Extract cpio
            if [ -f unpacked/vendor_ramdisk.cpio ]; then
              mkdir -p unpacked/ramdisk_extracted
              cd unpacked/ramdisk_extracted
              cpio -idmv < ../vendor_ramdisk.cpio 2>/dev/null || true
              cd ../..
            fi
          fi
          
          # Extract DTB
          DTB_OFFSET=$(( (RAMDISK_OFFSET + RAMDISK_SIZE + PAGE_SIZE - 1) / PAGE_SIZE * PAGE_SIZE ))
          if [ $DTB_SIZE -gt 0 ] && [ $DTB_SIZE -lt 10000000 ]; then
            dd if=vendor_boot.img bs=1 skip=$DTB_OFFSET count=$DTB_SIZE of=unpacked/dtb 2>/dev/null
          fi
          
          ls -lah unpacked/

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'yes' || github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: vendor-boot-unpacked
          path: unpacked/
          retention-days: 7
          
