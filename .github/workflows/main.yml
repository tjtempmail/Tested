name: ROM Extract and Release

on:
  workflow_dispatch:
    inputs:
      stock_rom_url:
        description: 'Stock ROM URL'
        required: true
        default: 'https://archive.org/download/infinix-hot-10i-x659b-stock-rom-firmware/R2-Infinix-Hot-10i-X659B-14.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Stock ROM
        run: |
          mkdir -p ~/Downloads
          wget "${{ github.event.inputs.stock_rom_url }}" -O ~/Downloads/stockrom.zip

      - name: Setup Dumpyara
        run: |
          mkdir ~/dumpyara
          cd ~/dumpyara
          git clone https://github.com/AndroidDumps/dumpyara.git dumpyara-master
          cd dumpyara-master
          bash setup.sh

      - name: Extract Firmware
        run: |
          cd ~/dumpyara
          bash ~/dumpyara/dumpyara-master/dumpyara.sh ~/Downloads/stockrom.zip || true
          echo "All directories in ~/dumpyara:"
          ls -la ~/dumpyara/

      - name: Install aospdtgen
        run: pip3 install aospdtgen

      - name: Generate Device Tree
        run: |
          mkdir -p ~/dumpyara/deviceTree
          # Find the extracted firmware directory
          FW_DIR=$(find ~/dumpyara -type d \( -name "system" -o -name "vendor" \) 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          if [ -z "$FW_DIR" ]; then
            FW_DIR=$(find ~/dumpyara -name "boot.img" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          fi
          echo "Using firmware dir: $FW_DIR"
          if [ -n "$FW_DIR" ] && [ -d "$FW_DIR" ]; then
            aospdtgen "$FW_DIR" -o ~/dumpyara/deviceTree
          else
            echo "ERROR: Could not find firmware directory"
            exit 1
          fi

      - name: Extract Vendor Files
        run: |
          cd ~/dumpyara/deviceTree
          FW_DIR=$(find ~/dumpyara -type d \( -name "system" -o -name "vendor" \) 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          if [ -n "$FW_DIR" ]; then
            bash extract-files.sh "$FW_DIR" || true
          fi

      - name: Package Release
        run: |
          cd ~
          tar czf release.tar.gz dumpyara/

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: rom-extracted
          path: ~/release.tar.gz
          
