name: Unpack Vendor Boot Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL to vendor_boot.img'
        required: true
        default: 'https://archive.org/download/vendor_boot_202603/vendor_boot.img'
        type: string
      upload_artifacts:
        description: 'Upload unpacked contents as artifacts'
        required: true
        default: true
        type: boolean

jobs:
  unpack-vendor-boot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lz4 gzip cpio file xz-utils python3

      - name: Download unpack_bootimg.py from AOSP
        run: |
          # Download the official Android unpack_bootimg.py tool
          wget -q https://android.googlesource.com/platform/system/tools/mkbootimg/+/refs/heads/main/unpack_bootimg.py?format=TEXT -O unpack_bootimg_base64.txt || \
          wget -q https://raw.githubusercontent.com/nicolas-schwab/unpack_bootimg_py/main/unpack_bootimg.py -O unpack_bootimg.py || \
          curl -sL https://raw.githubusercontent.com/nicolas-schwab/unpack_bootimg_py/main/unpack_bootimg.py -o unpack_bootimg.py
          
          # If we got base64, decode it
          if [ -f unpack_bootimg_base64.txt ]; then
            base64 -d unpack_bootimg_base64.txt > unpack_bootimg.py
          fi
          
          # Make executable
          chmod +x unpack_bootimg.py
          
          # Verify it works
          python3 unpack_bootimg.py --help || head -20 unpack_bootimg.py

      - name: Download vendor_boot.img
        run: |
          URL="${{ github.event.inputs.image_url }}"
          echo "Downloading from: $URL"
          wget --progress=bar:force -O vendor_boot.img "$URL"
          ls -lh vendor_boot.img
          file vendor_boot.img

      - name: Unpack vendor_boot.img using unpack_bootimg.py
        run: |
          mkdir -p unpacked
          
          # Use the official AOSP tool to unpack
          python3 unpack_bootimg.py --boot_img vendor_boot.img --out unpacked/ || \
          python3 unpack_bootimg.py --boot_img vendor_boot.img --out unpacked/ --format=info
          
          echo "Unpacking complete. Contents:"
          ls -lah unpacked/

      - name: Extract ramdisk contents
        run: |
          cd unpacked
          
          # Check for vendor_ramdisk files (v4 format has multiple)
          for ramdisk in vendor_ramdisk*; do
            if [ -f "$ramdisk" ]; then
              echo "Processing $ramdisk..."
              
              # Detect compression
              if file "$ramdisk" | grep -q "gzip"; then
                echo "Decompressing gzip..."
                gunzip -c "$ramdisk" > "${ramdisk}.cpio" || true
              elif file "$ramdisk" | grep -q "LZ4"; then
                echo "Decompressing LZ4..."
                lz4 -d "$ramdisk" "${ramdisk}.cpio" || true
              else
                cp "$ramdisk" "${ramdisk}.cpio"
              fi
              
              # Extract cpio if we have it
              if [ -f "${ramdisk}.cpio" ]; then
                mkdir -p "${ramdisk}_extracted"
                cd "${ramdisk}_extracted"
                cpio -idmv < "../${ramdisk}.cpio" || true
                cd ..
              fi
            fi
          done
          
          # Also check for standard ramdisk
          if [ -f "ramdisk" ]; then
            echo "Processing ramdisk..."
            mkdir -p ramdisk_extracted
            cd ramdisk_extracted
            cpio -idmv < ../ramdisk || true
            cd ..
          fi
          
          echo -e "\nFinal directory structure:"
          find . -type f -o -type d | head -50

      - name: Analyze image structure
        run: |
          echo "=== Vendor Boot Image Analysis ==="
          file vendor_boot.img
          
          echo -e "\n=== Hex Header (first 256 bytes) ==="
          xxd -l 256 vendor_boot.img | head -20
          
          echo -e "\n=== Unpacked Contents ==="
          ls -lah unpacked/

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-vendor-boot-${{ github.run_number }}
          path: |
            unpacked/
            vendor_boot.img
            unpack_bootimg.py
          retention-days: 30
          if-no-files-found: warn
          
