name: Device Tree & Vendor Blobs Generator (Release Archive)

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct URL to stock firmware (zip)'
        required: true
        type: string
      device_codename:
        description: 'Device codename (e.g., X659B)'
        required: true
        default: 'X659B'
        type: string
      device_manufacturer:
        description: 'Device manufacturer (e.g., infinix)'
        required: true
        default: 'infinix'
        type: string
      android_version:
        description: 'Android version for LineageOS (e.g., 21.0 for Android 14)'
        required: true
        default: '21.0'
        type: string
      archive_format:
        description: 'Archive format for release'
        required: true
        default: 'zip'
        type: choice
        options:
          - zip
          - tar.gz
          - both

env:
  WORK_DIR: ${{ github.workspace }}
  DUMP_DIR: ${{ github.workspace }}/dumpyara
  DT_DIR: ${{ github.workspace }}/device_tree
  VENDOR_DIR: ${{ github.workspace }}/vendor_blobs
  RELEASE_DIR: ${{ github.workspace }}/release

jobs:
  generate-and-package:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core \
            gnupg \
            flex \
            bison \
            build-essential \
            zip \
            curl \
            zlib1g-dev \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            libncurses5 \
            lib32ncurses5-dev \
            x11proto-core-dev \
            libx11-dev \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils \
            xsltproc \
            unzip \
            fontconfig \
            python3 \
            python3-pip \
            python3-venv \
            liblz4-tool \
            brotli \
            android-sdk-libsparse-utils \
            jq \
            tar \
            gzip

      - name: Setup Python environment
        run: |
          python3 -m pip install --upgrade pip
          pip3 install \
            aospdtgen \
            protobuf \
            pycryptodome \
            git+https://github.com/sebastianmuetzel/aik

      - name: Install dumpyara
        run: |
          mkdir -p ${{ env.DUMP_DIR }}
          cd ${{ env.DUMP_DIR }}
          git clone --depth=1 https://github.com/AndroidDumps/dumpyara.git .
          chmod +x dumpyara.sh

      - name: Download firmware
        run: |
          mkdir -p ${{ env.WORK_DIR }}/firmware
          cd ${{ env.WORK_DIR }}/firmware
          
          echo "Downloading firmware from provided URL..."
          wget -O firmware.zip "${{ github.event.inputs.firmware_url }}" --progress=dot:giga
          
          FILE_SIZE=$(stat -c%s "firmware.zip")
          echo "Downloaded firmware size: $FILE_SIZE bytes"
          
          # Verify it's a valid zip
          if ! unzip -t firmware.zip > /dev/null 2>&1; then
            echo "::error::Downloaded file is not a valid zip archive!"
            exit 1
          fi

      - name: Extract firmware with dumpyara
        id: dump_firmware
        run: |
          cd ${{ env.DUMP_DIR }}
          
          echo "Starting firmware extraction..."
          ./dumpyara.sh ${{ env.WORK_DIR }}/firmware/firmware.zip
          
          # Find the extracted firmware directory
          EXTRACTED_DIR=$(find ${{ env.DUMP_DIR }}/working -maxdepth 1 -type d | tail -n 1)
          echo "extracted_path=$EXTRACTED_DIR" >> $GITHUB_OUTPUT
          echo "Extracted to: $EXTRACTED_DIR"
          
          # List contents for debugging
          ls -la "$EXTRACTED_DIR"

      - name: Detect device info
        id: device_info
        run: |
          VENDOR_BUILD_PROP="${{ steps.dump_firmware.outputs.extracted_path }}/vendor/build.prop"
          SYSTEM_BUILD_PROP="${{ steps.dump_firmware.outputs.extracted_path }}/system/system/build.prop"
          
          # Try to detect device name from build.prop
          if [ -f "$VENDOR_BUILD_PROP" ]; then
            DEVICE_NAME=$(grep -E "^ro.product.vendor.device=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "${{ github.event.inputs.device_codename }}")
            DEVICE_MODEL=$(grep -E "^ro.product.vendor.model=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
            BUILD_FINGERPRINT=$(grep -E "^ro.vendor.build.fingerprint=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          elif [ -f "$SYSTEM_BUILD_PROP" ]; then
            DEVICE_NAME=$(grep -E "^ro.product.system.device=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "${{ github.event.inputs.device_codename }}")
            DEVICE_MODEL=$(grep -E "^ro.product.system.model=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
            BUILD_FINGERPRINT=$(grep -E "^ro.system.build.fingerprint=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          else
            DEVICE_NAME="${{ github.event.inputs.device_codename }}"
            DEVICE_MODEL="Unknown"
            BUILD_FINGERPRINT="Unknown"
          fi
          
          # Get Android version from build.prop
          if [ -f "$VENDOR_BUILD_PROP" ]; then
            ANDROID_VERSION=$(grep -E "^ro.vendor.build.version.release=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          elif [ -f "$SYSTEM_BUILD_PROP" ]; then
            ANDROID_VERSION=$(grep -E "^ro.system.build.version.release=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          else
            ANDROID_VERSION="Unknown"
          fi
          
          echo "device_name=$DEVICE_NAME" >> $GITHUB_OUTPUT
          echo "device_model=$DEVICE_MODEL" >> $GITHUB_OUTPUT
          echo "build_fingerprint=$BUILD_FINGERPRINT" >> $GITHUB_OUTPUT
          echo "stock_android_version=$ANDROID_VERSION" >> $GITHUB_OUTPUT
          
          echo "Detected device: $DEVICE_NAME ($DEVICE_MODEL)"
          echo "Stock Android: $ANDROID_VERSION"
          echo "Fingerprint: $BUILD_FINGERPRINT"

      - name: Generate device tree with aospdtgen
        run: |
          mkdir -p ${{ env.DT_DIR }}
          
          echo "Generating device tree..."
          aospdtgen "${{ steps.dump_firmware.outputs.extracted_path }}" \
            -o "${{ env.DT_DIR }}" \
            --kernel-source "https://github.com/user/android_kernel_${{ github.event.inputs.device_manufacturer }}_${{ github.event.inputs.device_codename }}"
          
          echo "Device tree generated at: ${{ env.DT_DIR }}"
          
          # Find the generated device tree directory
          DT_GENERATED=$(find ${{ env.DT_DIR }} -maxdepth 1 -type d -name "android_device_*" | head -n 1)
          if [ -z "$DT_GENERATED" ]; then
            echo "::error::No device tree directory found!"
            find ${{ env.DT_DIR }} -type d
            exit 1
          fi
          
          echo "dt_path=$DT_GENERATED" >> $GITHUB_ENV
          echo "Device tree location: $DT_GENERATED"

      - name: Prepare vendor blobs extraction
        run: |
          DT_PATH="${{ env.dt_path }}"
          
          if [ -d "$DT_PATH" ]; then
            cd "$DT_PATH"
            
            # Make extract-files.sh executable if it exists
            if [ -f "extract-files.sh" ]; then
              chmod +x extract-files.sh
              echo "Found extract-files.sh"
            fi
            
            if [ -f "setup-makefiles.sh" ]; then
              chmod +x setup-makefiles.sh
              echo "Found setup-makefiles.sh"
            fi
            
            # List device tree structure
            echo "Device tree structure:"
            find "$DT_PATH" -maxdepth 2 -type f | head -30
          else
            echo "::warning::Device tree path not found: $DT_PATH"
          fi

      - name: Extract vendor blobs
        run: |
          DT_PATH="${{ env.dt_path }}"
          VENDOR_EXTRACT_PATH="${{ steps.dump_firmware.outputs.extracted_path }}"
          
          mkdir -p ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}
          
          if [ -f "$DT_PATH/extract-files.sh" ]; then
            echo "Running extract-files.sh..."
            cd "$DT_PATH"
            
            # Create a temporary directory for extraction
            mkdir -p /tmp/vendor_extract
            VENDOR_OUT="/tmp/vendor_extract"
            
            # Run extraction pointing to dumpyara output
            ./extract-files.sh "$VENDOR_EXTRACT_PATH" 2>&1 || {
              echo "::warning::extract-files.sh failed, performing manual extraction..."
            }
            
            # Check if extraction created vendor directory
            if [ -d "$DT_PATH/../vendor" ]; then
              cp -r "$DT_PATH/../vendor/"* ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/ 2>/dev/null || true
            fi
          fi
          
          # Always perform manual backup extraction to ensure we have all blobs
          echo "Performing comprehensive vendor blob extraction..."
          
          # Copy vendor partition
          if [ -d "$VENDOR_EXTRACT_PATH/vendor" ]; then
            echo "Copying vendor partition..."
            cp -r "$VENDOR_EXTRACT_PATH/vendor" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
          fi
          
          # Copy other partitions
          for partition in system system_ext product vendor_dlkm odm odm_dlkm; do
            if [ -d "$VENDOR_EXTRACT_PATH/$partition" ]; then
              echo "Copying $partition partition..."
              cp -r "$VENDOR_EXTRACT_PATH/$partition" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
            fi
          done
          
          # Copy proprietary-files.txt if generated
          if [ -f "$DT_PATH/proprietary-files.txt" ]; then
            cp "$DT_PATH/proprietary-files.txt" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
          fi

      - name: Create vendor repository structure
        run: |
          VENDOR_REPO="${{ env.VENDOR_DIR }}/android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          mkdir -p "$VENDOR_REPO"
          
          # Move extracted blobs to proper structure
          if [ -d "${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" ]; then
            mv ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/* "$VENDOR_REPO/" 2>/dev/null || true
            rmdir ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }} 2>/dev/null || true
          fi
          
          # Create Android.bp
          cat > "$VENDOR_REPO/Android.bp" << 'EOF'
          // Automatically generated vendor blobs
          package {
              default_applicable_licenses: ["external_vendor_license"],
          }
          EOF
          
          # Create Android.mk
          cat > "$VENDOR_REPO/Android.mk" << EOF
          LOCAL_PATH := \$(call my-dir)
          
          ifeq (\$(TARGET_DEVICE),${{ steps.device_info.outputs.device_name }})
          include \$(call all-subdir-makefiles,\$(LOCAL_PATH))
          endif
          EOF
          
          # Create BoardConfigVendor.mk
          cat > "$VENDOR_REPO/BoardConfigVendor.mk" << EOF
          # Automatically generated vendor configuration
          # for ${{ steps.device_info.outputs.device_name }}
          
          LOCAL_STEM := ${{ steps.device_info.outputs.device_name }}
          EOF
          
          echo "vendor_path=$VENDOR_REPO" >> $GITHUB_ENV
          echo "Vendor repository prepared at: $VENDOR_REPO"

      - name: Generate LineageOS manifest snippet
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          
          cat > ${{ env.RELEASE_DIR }}/local_manifest.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!-- 
            LineageOS ${{ github.event.inputs.android_version }} Device Manifest 
            for ${{ steps.device_info.outputs.device_name }} (${{ steps.device_info.outputs.device_model }})
            
            Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            Stock Firmware: ${{ github.event.inputs.firmware_url }}
            Stock Android: ${{ steps.device_info.outputs.stock_android_version }}
            Build Fingerprint: ${{ steps.device_info.outputs.build_fingerprint }}
          -->
          <manifest>
            
            <!-- Device tree -->
            <project path="device/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                     name="android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                     remote="github" 
                     revision="main" />
            
            <!-- Vendor blobs -->
            <project path="vendor/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                     name="android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                     remote="github" 
                     revision="main" />
            
            <!-- 
              KERNEL: You need to create this repository manually or use prebuilt kernel
              <project path="kernel/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                       name="android_kernel_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                       remote="github" 
                       revision="main" />
            -->
            
          </manifest>
          EOF

      - name: Create README files
        run: |
          # Device Tree README
          cat > ${{ env.dt_path }}/README.md << EOF
          # Device Tree for ${{ steps.device_info.outputs.device_name }} (${{ steps.device_info.outputs.device_model }})
          
          ## Device Specifications
          
          | Feature | Specification |
          |---------|--------------|
          | Device Name | ${{ steps.device_info.outputs.device_name }} |
          | Model | ${{ steps.device_info.outputs.device_model }} |
          | Manufacturer | ${{ github.event.inputs.device_manufacturer }} |
          | Stock Android | ${{ steps.device_info.outputs.stock_android_version }} |
          | Target LineageOS | ${{ github.event.inputs.android_version }} |
          
          ## Build Instructions
          
          1. Initialize LineageOS source:
             \`\`\`bash
             repo init -u https://github.com/LineageOS/android.git -b lineage-${{ github.event.inputs.android_version }} --git-lfs
             \`\`\`
          
          2. Create local manifest:
             \`\`\`bash
             mkdir -p .repo/local_manifests
             cp local_manifest.xml .repo/local_manifests/
             \`\`\`
          
          3. Sync repositories:
             \`\`\`bash
             repo sync -c --no-clone-bundle --no-tags -j\$(nproc --all)
             \`\`\`
          
          4. Build:
             \`\`\`bash
             source build/envsetup.sh
             lunch lineage_${{ steps.device_info.outputs.device_name }}-userdebug
             mka bacon
             \`\`\`
          
          ## Device Info
          - **Build Fingerprint:** \`${{ steps.device_info.outputs.build_fingerprint }}\`
          - **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Source Firmware:** ${{ github.event.inputs.firmware_url }}
          EOF
          
          # Vendor README
          cat > ${{ env.vendor_path }}/README.md << EOF
          # Vendor Blobs for ${{ steps.device_info.outputs.device_name }} (${{ steps.device_info.outputs.device_model }})
          
          ## Information
          - **Device:** ${{ steps.device_info.outputs.device_name }}
          - **Model:** ${{ steps.device_info.outputs.device_model }}
          - **Extracted from:** ${{ github.event.inputs.firmware_url }}
          - **Android Version:** ${{ steps.device_info.outputs.stock_android_version }}
          - **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Contents
          This repository contains proprietary vendor blobs extracted from stock firmware.
          
          ## License
          These blobs are proprietary and belong to their respective owners.
          EOF

      - name: Create release archives
        id: create_archives
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          
          DT_NAME="android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          VENDOR_NAME="android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_BASE="${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}_${{ github.event.inputs.android_version }}_${TIMESTAMP}"
          
          echo "release_name=$RELEASE_BASE" >> $GITHUB_OUTPUT
          
          # Create ZIP archives
          if [[ "${{ github.event.inputs.archive_format }}" == "zip" ]] || [[ "${{ github.event.inputs.archive_format }}" == "both" ]]; then
            echo "Creating ZIP archives..."
            
            # Device tree ZIP
            cd ${{ env.DT_DIR }}
            zip -r "${{ env.RELEASE_DIR }}/${DT_NAME}.zip" "$(basename ${{ env.dt_path }})" -x "*.git*" "*.github*"
            
            # Vendor ZIP
            cd ${{ env.VENDOR_DIR }}
            zip -r "${{ env.RELEASE_DIR }}/${VENDOR_NAME}.zip" "$(basename ${{ env.vendor_path }})" -x "*.git*" "*.github*"
            
            # Combined ZIP
            cd ${{ env.WORK_DIR }}
            zip -r "${{ env.RELEASE_DIR }}/${RELEASE_BASE}_COMPLETE.zip" \
              "${{ env.RELEASE_DIR }}/local_manifest.xml" \
              "${{ env.DT_DIR }}/" \
              "${{ env.VENDOR_DIR }}/" \
              -x "*.git*" "*.github*" "*/firmware/*" "*/dumpyara/*"
          fi
          
          # Create TAR.GZ archives
          if [[ "${{ github.event.inputs.archive_format }}" == "tar.gz" ]] || [[ "${{ github.event.inputs.archive_format }}" == "both" ]]; then
            echo "Creating TAR.GZ archives..."
            
            # Device tree TAR
            cd ${{ env.DT_DIR }}
            tar -czf "${{ env.RELEASE_DIR }}/${DT_NAME}.tar.gz" --exclude=".git" --exclude=".github" "$(basename ${{ env.dt_path }})"
            
            # Vendor TAR
            cd ${{ env.VENDOR_DIR }}
            tar -czf "${{ env.RELEASE_DIR }}/${VENDOR_NAME}.tar.gz" --exclude=".git" --exclude=".github" "$(basename ${{ env.vendor_path }})"
            
            # Combined TAR
            cd ${{ env.WORK_DIR }}
            tar -czf "${{ env.RELEASE_DIR }}/${RELEASE_BASE}_COMPLETE.tar.gz" \
              --exclude=".git" --exclude=".github" --exclude="firmware" --exclude="dumpyara" \
              -C ${{ env.WORK_DIR }} \
              release/local_manifest.xml \
              device_tree/ \
              vendor_blobs/
          fi
          
          # List created files
          echo "Created archives:"
          ls -lh ${{ env.RELEASE_DIR }}/

      - name: Create installation script
        run: |
          cat > ${{ env.RELEASE_DIR }}/setup.sh << 'EOF'
          
