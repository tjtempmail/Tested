name: Unpack Vendor Boot Image

on:
  # TEMPORARY: Add this to test the workflow before merging to main
  # Remove this after testing - it's only needed once to make the button appear
  pull_request:
    branches: [main, master]
  
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL to vendor_boot.img'
        required: true
        default: 'https://archive.org/download/vendor_boot_202603/vendor_boot.img'
        type: string
      upload_artifacts:
        description: 'Upload unpacked contents as artifacts'
        required: true
        default: true
        type: boolean

jobs:
  unpack-vendor-boot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lz4 gzip cpio file

      - name: Download vendor_boot.img
        run: |
          URL="${{ github.event.inputs.image_url || 'https://archive.org/download/vendor_boot_202603/vendor_boot.img' }}"
          echo "Downloading from: $URL"
          wget --progress=bar:force -O vendor_boot.img "$URL"
          ls -lh vendor_boot.img
          file vendor_boot.img

      - name: Download magiskboot
        run: |
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O magisk.zip
          unzip -o magisk.zip -d magisk_dir
          find magisk_dir -name "magiskboot" -exec cp {} ./magiskboot \;
          chmod +x ./magiskboot

      - name: Unpack vendor_boot.img
        run: |
          mkdir -p unpacked
          ./magiskboot unpack vendor_boot.img
          mv kernel* unpacked/ 2>/dev/null || true
          mv ramdisk* unpacked/ 2>/dev/null || true
          mv vendor_ramdisk* unpacked/ 2>/dev/null || true
          mv *.img unpacked/ 2>/dev/null || true
          ls -lah unpacked/

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-vendor-boot
          path: unpacked/
          retention-days: 7
          
