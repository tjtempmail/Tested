name: Generate LineageOS Device Tree (FULL WORKING)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      FIRMWARE_URL:
        description: 'Direct URL to firmware zip'
        required: true
      DEVICE_CODENAME:
        required: true
      BRAND:
        required: true
      MODEL:
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip git wget aria2 unzip \
          simg2img lz4 brotli p7zip-full erofs-utils \
          android-sdk-libsparse-utils

    - name: Clone dumpyara
      run: |
        git clone https://github.com/sebaubuntu-python/dumpyara.git
        cd dumpyara
        pip install -e .
        cd ..

    - name: Clone aospdtgen
      run: |
        git clone https://github.com/sebaubuntu-python/aospdtgen.git
        cd aospdtgen
        pip install -e .
        cd ..

    - name: Download firmware
      run: |
        aria2c -x16 -s16 -o firmware.zip "${{ github.event.inputs.FIRMWARE_URL }}"

    - name: Extract partitions using dumpyara
      run: |
        mkdir dump
        python -m dumpyara firmware.zip -o dump/

    - name: Generate device tree using aospdtgen
      run: |
        mkdir device_tree
        python -m aospdtgen dump/ -o device_tree/

    # ===============================
    # PROPER BLOBS EXTRACTION
    # ===============================
    - name: Prepare vendor directory
      run: |
        mkdir -p vendor/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}
        cp -r device_tree/* device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}/ || true

    - name: Copy dump into device folder (for extraction script)
      run: |
        mkdir -p device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}/dump
        cp -r dump/* device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}/dump/

    - name: Run extract-files.py (REAL extraction)
      run: |
        cd device/${{ github.event.inputs.BRAND }}/${{ github.event.inputs.DEVICE_CODENAME }}
        if [ -f extract-files.py ]; then
          python3 extract-files.py dump
        fi
        cd ../../../../

    # ===============================
    # PACKAGE OUTPUT
    # ===============================
    - name: Package device + vendor tree
      run: |
        mkdir final

        mv device final/
        mv vendor final/ || true

        cd final
        tar -czf ../lineage_${{ github.event.inputs.DEVICE_CODENAME }}_tree.tar.gz *
        cd ..

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: lineage_${{ github.event.inputs.DEVICE_CODENAME }}_tree.tar.gz
        tag_name: dt_${{ github.run_id }}
        name: "LineageOS Tree - ${{ github.event.inputs.DEVICE_CODENAME }}"
        body: |
          Auto-generated tree (Device + Vendor)

          Device: ${{ github.event.inputs.MODEL }}
          Codename: ${{ github.event.inputs.DEVICE_CODENAME }}

          Generated using:
          - dumpyara
          - aospdtgen

          ⚠ Manual fixes required:
          - Kernel source
          - SEPolicy
          - Hardware services
          - RIL fixes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
