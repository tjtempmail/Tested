name: Device Tree & Vendor Blobs Generator

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct URL to stock firmware (zip)'
        required: true
        type: string
      device_codename:
        description: 'Device codename (e.g., X659B)'
        required: true
        default: 'X659B'
        type: string
      device_manufacturer:
        description: 'Device manufacturer (e.g., infinix)'
        required: true
        default: 'infinix'
        type: string
      android_version:
        description: 'Android version for LineageOS (e.g., 21.0 for Android 14)'
        required: true
        default: '21.0'
        type: string
      branch_name:
        description: 'Branch name for device tree repo'
        required: true
        default: 'main'
        type: string

env:
  WORK_DIR: ${{ github.workspace }}
  DUMP_DIR: ${{ github.workspace }}/dumpyara
  DT_DIR: ${{ github.workspace }}/device_tree
  VENDOR_DIR: ${{ github.workspace }}/vendor_blobs
  GIT_USER_NAME: ${{ github.actor }}
  GIT_USER_EMAIL: ${{ github.actor }}@users.noreply.github.com

jobs:
  generate-device-tree:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core \
            gnupg \
            flex \
            bison \
            build-essential \
            zip \
            curl \
            zlib1g-dev \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            libncurses5 \
            lib32ncurses5-dev \
            x11proto-core-dev \
            libx11-dev \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils \
            xsltproc \
            unzip \
            fontconfig \
            python3 \
            python3-pip \
            python3-venv \
            liblz4-tool \
            brotli \
            android-sdk-libsparse-utils \
            jq

      - name: Setup Python environment
        run: |
          python3 -m pip install --upgrade pip
          pip3 install \
            aospdtgen \
            protobuf \
            pycryptodome \
            git+https://github.com/sebastianmuetzel/aik

      - name: Install dumpyara
        run: |
          mkdir -p ${{ env.DUMP_DIR }}
          cd ${{ env.DUMP_DIR }}
          git clone --depth=1 https://github.com/AndroidDumps/dumpyara.git .
          chmod +x dumpyara.sh

      - name: Download firmware
        run: |
          mkdir -p ${{ env.WORK_DIR }}/firmware
          cd ${{ env.WORK_DIR }}/firmware
          
          echo "Downloading firmware from provided URL..."
          wget -O firmware.zip "${{ github.event.inputs.firmware_url }}" --progress=dot:giga
          
          FILE_SIZE=$(stat -c%s "firmware.zip")
          echo "Downloaded firmware size: $FILE_SIZE bytes"
          
          # Verify it's a valid zip
          if ! unzip -t firmware.zip > /dev/null 2>&1; then
            echo "::error::Downloaded file is not a valid zip archive!"
            exit 1
          fi

      - name: Extract firmware with dumpyara
        id: dump_firmware
        run: |
          cd ${{ env.DUMP_DIR }}
          
          echo "Starting firmware extraction..."
          ./dumpyara.sh ${{ env.WORK_DIR }}/firmware/firmware.zip
          
          # Find the extracted firmware directory
          EXTRACTED_DIR=$(find ${{ env.DUMP_DIR }}/working -maxdepth 1 -type d | tail -n 1)
          echo "extracted_path=$EXTRACTED_DIR" >> $GITHUB_OUTPUT
          echo "Extracted to: $EXTRACTED_DIR"
          
          # List contents for debugging
          ls -la "$EXTRACTED_DIR"

      - name: Generate device tree with aospdtgen
        run: |
          mkdir -p ${{ env.DT_DIR }}
          
          echo "Generating device tree..."
          aospdtgen "${{ steps.dump_firmware.outputs.extracted_path }}" \
            -o "${{ env.DT_DIR }}" \
            --kernel-source "https://github.com/${{ github.repository_owner }}/android_kernel_${{ github.event.inputs.device_manufacturer }}_${{ github.event.inputs.device_codename }}"
          
          echo "Device tree generated at: ${{ env.DT_DIR }}"
          find ${{ env.DT_DIR }} -type f -name "*.mk" -o -name "*.bp" -o -name "*.sh" | head -20

      - name: Detect device info
        id: device_info
        run: |
          VENDOR_BUILD_PROP="${{ steps.dump_firmware.outputs.extracted_path }}/vendor/build.prop"
          SYSTEM_BUILD_PROP="${{ steps.dump_firmware.outputs.extracted_path }}/system/system/build.prop"
          
          # Try to detect device name from build.prop
          if [ -f "$VENDOR_BUILD_PROP" ]; then
            DEVICE_NAME=$(grep -E "^ro.product.vendor.device=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "${{ github.event.inputs.device_codename }}")
            DEVICE_MODEL=$(grep -E "^ro.product.vendor.model=" "$VENDOR_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          elif [ -f "$SYSTEM_BUILD_PROP" ]; then
            DEVICE_NAME=$(grep -E "^ro.product.system.device=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "${{ github.event.inputs.device_codename }}")
            DEVICE_MODEL=$(grep -E "^ro.product.system.model=" "$SYSTEM_BUILD_PROP" | cut -d'=' -f2 || echo "Unknown")
          else
            DEVICE_NAME="${{ github.event.inputs.device_codename }}"
            DEVICE_MODEL="Unknown"
          fi
          
          echo "device_name=$DEVICE_NAME" >> $GITHUB_OUTPUT
          echo "device_model=$DEVICE_MODEL" >> $GITHUB_OUTPUT
          echo "Detected device: $DEVICE_NAME ($DEVICE_MODEL)"

      - name: Prepare vendor blobs extraction script
        run: |
          DT_PATH="${{ env.DT_DIR }}/android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          
          if [ -d "$DT_PATH" ]; then
            cd "$DT_PATH"
            
            # Make extract-files.sh executable if it exists
            if [ -f "extract-files.sh" ]; then
              chmod +x extract-files.sh
              echo "Found extract-files.sh"
            else
              echo "::warning::extract-files.sh not found in device tree"
            fi
            
            # List device tree structure
            echo "Device tree structure:"
            tree -L 2 "$DT_PATH" || find "$DT_PATH" -maxdepth 2 -type f
          else
            echo "::warning::Device tree path not found: $DT_PATH"
            find ${{ env.DT_DIR }} -type d
          fi

      - name: Extract vendor blobs
        run: |
          DT_PATH="${{ env.DT_DIR }}/android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          VENDOR_EXTRACT_PATH="${{ steps.dump_firmware.outputs.extracted_path }}"
          
          mkdir -p ${{ env.VENDOR_DIR }}
          
          if [ -f "$DT_PATH/extract-files.sh" ]; then
            echo "Running extract-files.sh..."
            cd "$DT_PATH"
            
            # Run extraction pointing to dumpyara output
            ./extract-files.sh "$VENDOR_EXTRACT_PATH" || {
              echo "::warning::extract-files.sh failed, performing manual extraction..."
              
              # Fallback: Manual vendor blob extraction
              mkdir -p ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}
              
              # Copy common vendor directories
              for dir in vendor system vendor_dlkm system_ext product; do
                if [ -d "$VENDOR_EXTRACT_PATH/$dir" ]; then
                  echo "Copying $dir..."
                  cp -r "$VENDOR_EXTRACT_PATH/$dir" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
                fi
              done
            }
          else
            echo "Performing manual vendor blob extraction..."
            mkdir -p ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}
            
            # Copy vendor partition
            if [ -d "$VENDOR_EXTRACT_PATH/vendor" ]; then
              cp -r "$VENDOR_EXTRACT_PATH/vendor" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
            fi
            
            # Copy other partitions if they exist
            for partition in system system_ext product vendor_dlkm odm; do
              if [ -d "$VENDOR_EXTRACT_PATH/$partition" ]; then
                echo "Copying $partition partition..."
                cp -r "$VENDOR_EXTRACT_PATH/$partition" ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/
              fi
            done
          fi

      - name: Create vendor blobs repository structure
        run: |
          VENDOR_REPO="${{ env.VENDOR_DIR }}/android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          mkdir -p "$VENDOR_REPO"
          
          # Move extracted blobs to proper structure
          if [ -d "${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}" ]; then
            mv ${{ env.VENDOR_DIR }}/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}/* "$VENDOR_REPO/" 2>/dev/null || true
          fi
          
          # Create Android.bp if it doesn't exist
          if [ ! -f "$VENDOR_REPO/Android.bp" ]; then
            cat > "$VENDOR_REPO/Android.bp" << 'EOF'
            // Automatically generated vendor blobs
            package {
                default_applicable_licenses: ["external_vendor_license"],
            }
          EOF
          fi
          
          # Create Android.mk if it doesn't exist  
          if [ ! -f "$VENDOR_REPO/Android.mk" ]; then
            cat > "$VENDOR_REPO/Android.mk" << EOF
            LOCAL_PATH := \$(call my-dir)
            
            ifeq (\$(TARGET_DEVICE),${{ steps.device_info.outputs.device_name }})
            include \$(call all-subdir-makefiles,\$(LOCAL_PATH))
            endif
          EOF
          fi
          
          echo "Vendor repository prepared at: $VENDOR_REPO"

      - name: Setup Git for pushing
        run: |
          git config --global user.name "$GIT_USER_NAME"
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global init.defaultBranch main

      - name: Push device tree to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          DEVICE_REPO="android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          DT_SOURCE="${{ env.DT_DIR }}/$DEVICE_REPO"
          
          if [ ! -d "$DT_SOURCE" ]; then
            echo "::error::Device tree not found at $DT_SOURCE"
            find ${{ env.DT_DIR }} -type d -maxdepth 1
            exit 1
          fi
          
          cd "$DT_SOURCE"
          
          # Initialize git repo
          git init
          git add .
          git commit -m "Initial device tree for ${{ steps.device_info.outputs.device_name }}
          
          Generated from firmware: ${{ github.event.inputs.firmware_url }}
          Device: ${{ steps.device_info.outputs.device_model }}
          Android Version: ${{ github.event.inputs.android_version }}
          Generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          Using:
          - aospdtgen for device tree generation
          - dumpyara for firmware extraction"
          
          # Create repo if it doesn't exist (using GitHub API)
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d "{\"name\":\"$DEVICE_REPO\",\"private\":false,\"description\":\"Device tree for ${{ steps.device_info.outputs.device_name }} (${{ steps.device_info.outputs.device_model }})\"}" || true
          
          # Push to GitHub
          git remote add origin "https://$GH_TOKEN@github.com/${{ github.repository_owner }}/$DEVICE_REPO.git" || \
          git remote set-url origin "https://$GH_TOKEN@github.com/${{ github.repository_owner }}/$DEVICE_REPO.git"
          
          git push -u origin ${{ github.event.inputs.branch_name }} --force || {
            echo "::warning::Push failed, trying with different branch name..."
            git push -u origin HEAD:${{ github.event.inputs.branch_name }}_$(date +%s) --force
          }
          
          echo "device_repo=$DEVICE_REPO" >> $GITHUB_ENV

      - name: Push vendor blobs to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          VENDOR_REPO_NAME="android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}"
          VENDOR_SOURCE="${{ env.VENDOR_DIR }}/$VENDOR_REPO_NAME"
          
          cd "$VENDOR_SOURCE"
          
          # Initialize git repo
          git init
          git add .
          git commit -m "Initial vendor blobs for ${{ steps.device_info.outputs.device_name }}
          
          Extracted from firmware: ${{ github.event.inputs.firmware_url }}
          Device: ${{ steps.device_info.outputs.device_model }}
          Android Version: ${{ github.event.inputs.android_version }}
          Generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          # Create repo if it doesn't exist
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d "{\"name\":\"$VENDOR_REPO_NAME\",\"private\":false,\"description\":\"Vendor blobs for ${{ steps.device_info.outputs.device_name }} (${{ steps.device_info.outputs.device_model }})\"}" || true
          
          # Push to GitHub
          git remote add origin "https://$GH_TOKEN@github.com/${{ github.repository_owner }}/$VENDOR_REPO_NAME.git" || \
          git remote set-url origin "https://$GH_TOKEN@github.com/${{ github.repository_owner }}/$VENDOR_REPO_NAME.git"
          
          git push -u origin ${{ github.event.inputs.branch_name }} --force || {
            echo "::warning::Push failed, trying with different branch name..."
            git push -u origin HEAD:${{ github.event.inputs.branch_name }}_$(date +%s) --force
          }
          
          echo "vendor_repo=$VENDOR_REPO_NAME" >> $GITHUB_ENV

      - name: Generate LineageOS manifest snippet
        run: |
          cat > ${{ env.WORK_DIR }}/manifest.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!-- LineageOS ${{ github.event.inputs.android_version }} Device Manifest for ${{ steps.device_info.outputs.device_name }} -->
          <manifest>
            
            <!-- Device tree -->
            <project path="device/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                     name="${{ github.repository_owner }}/android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                     remote="github" 
                     revision="${{ github.event.inputs.branch_name }}" />
            
            <!-- Vendor blobs -->
            <project path="vendor/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                     name="${{ github.repository_owner }}/android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                     remote="github" 
                     revision="${{ github.event.inputs.branch_name }}" />
            
            <!-- Kernel (placeholder - replace with actual kernel repo) -->
            <!-- <project path="kernel/${{ github.event.inputs.device_manufacturer }}/${{ steps.device_info.outputs.device_name }}" 
                     name="${{ github.repository_owner }}/android_kernel_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" 
                     remote="github" 
                     revision="main" /> -->
            
          </manifest>
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: device-tree-and-vendor-${{ steps.device_info.outputs.device_name }}
          path: |
            ${{ env.DT_DIR }}/
            ${{ env.VENDOR_DIR }}/
            ${{ env.WORK_DIR }}/manifest.xml
          retention-days: 7

      - name: Create summary
        run: |
          echo "## 🚀 Device Tree Generation Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Device Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Device Name:** ${{ steps.device_info.outputs.device_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Device Model:** ${{ steps.device_info.outputs.device_model }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Manufacturer:** ${{ github.event.inputs.device_manufacturer }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Android Version:** ${{ github.event.inputs.android_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Repositories" >> $GITHUB_STEP_SUMMARY
          echo "- **Device Tree:** https://github.com/${{ github.repository_owner }}/android_device_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Vendor Blobs:** https://github.com/${{ github.repository_owner }}/android_vendor_${{ github.event.inputs.device_manufacturer }}_${{ steps.device_info.outputs.device_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Clone your LineageOS source tree" >> $GITHUB_STEP_SUMMARY
          echo "2. Add the manifest snippet to your local manifest:" >> $GITHUB_STEP_SUMMARY
          echo '   ```bash' >> $GITHUB_STEP_SUMMARY
          echo "   curl -o .repo/local_manifests/${{ steps.device_info.outputs.device_name }}.xml https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.device_repo }}/${{ github.event.inputs.branch_name }}/manifest.xml" >> $GITHUB_STEP_SUMMARY
          echo '   ```' >> $GITHUB_STEP_SUMMARY
          echo "3. Sync the repositories:" >> $GITHUB_STEP_SUMMARY
          echo '   ```bash' >> $GITHUB_STEP_SUMMARY
          echo "   repo sync -c --no-clone-bundle --no-tags -j$(nproc --all)" >> $GITHUB_STEP_SUMMARY
          echo '   ```' >> $GITHUB_STEP_SUMMARY
          echo "4. Start the build:" >> $GITHUB_STEP_SUMMARY
          echo '   ```bash' >> $GITHUB_STEP_SUMMARY
          echo "   source build/envsetup.sh" >> $GITHUB_STEP_SUMMARY
          echo "   lunch lineage_${{ steps.device_info.outputs.device_name }}-userdebug" >> $GITHUB_STEP_SUMMARY
          echo "   mka bacon" >> $GITHUB_STEP_SUMMARY
          echo '   ```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          rm -rf ${{ env.WORK_DIR }}/firmware/firmware.zip
          echo "Cleanup completed"
          
