name: Unpack Vendor Boot Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL to vendor_boot.img'
        required: true
        default: 'https://archive.org/download/vendor_boot_202603/vendor_boot.img'
        type: string
      upload_artifacts:
        description: 'Upload unpacked contents as artifacts'
        required: true
        default: true
        type: boolean

jobs:
  unpack-vendor-boot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lz4 gzip cpio file xz-utils xxd \
            android-sdk-libsparse-utils  # For simg2img

      - name: Download vendor_boot.img
        run: |
          URL="${{ github.event.inputs.image_url }}"
          echo "Downloading from: $URL"
          wget --progress=bar:force -O vendor_boot.img "$URL"
          ls -lh vendor_boot.img
          
          echo "=== File Analysis ==="
          file vendor_boot.img
          
          echo "=== First 32 bytes (hex) ==="
          xxd -l 32 vendor_boot.img

      - name: Check if sparse image and convert
        run: |
          # Check for sparse magic (0xed26ff3a) at offset 0
          SPARSE_MAGIC=$(xxd -p -l 4 vendor_boot.img)
          echo "Sparse magic check: $SPARSE_MAGIC"
          
          if [ "$SPARSE_MAGIC" = "3aff26ed" ]; then
            echo "Detected sparse image format, converting..."
            simg2img vendor_boot.img vendor_boot_raw.img
            mv vendor_boot_raw.img vendor_boot.img
            echo "Converted to raw image"
            file vendor_boot.img
          else
            echo "Not a sparse image (magic: $SPARSE_MAGIC)"
          fi

      - name: Try Android_boot_image_editor
        run: |
          # Clone the comprehensive Android boot image editor
          git clone --depth 1 https://github.com/cfig/Android_boot_image_editor.git abie
          cd abie
          
          # Copy image
          cp ../vendor_boot.img ./
          
          # Try to unpack
          ./gradlew unpack || true
          
          # Check what was extracted
          ls -lah build/unzip_boot/ 2>/dev/null || true

      - name: Fallback: Manual extraction if needed
        run: |
          # If the above failed, try to identify what we have
          echo "=== Checking file type again ==="
          file vendor_boot.img
          
          # Check magic at different offsets
          echo "Magic at 0: $(xxd -p -l 8 vendor_boot.img)"
          echo "Magic at 4096: $(xxd -p -l 8 -s 4096 vendor_boot.img 2>/dev/null || echo 'N/A')"
          
          # If it's ext4, try to mount it
          if file vendor_boot.img | grep -q "ext4"; then
            echo "Detected ext4 filesystem, mounting..."
            mkdir -p mnt
            sudo mount -o loop vendor_boot.img mnt/ || true
            ls -lah mnt/ || true
            sudo umount mnt/ || true
          fi

      - name: Organize output
        run: |
          mkdir -p unpacked
          
          # Copy anything from Android_boot_image_editor
          if [ -d "abie/build/unzip_boot" ]; then
            cp -r abie/build/unzip_boot/* unpacked/ 2>/dev/null || true
          fi
          
          # Copy original image
          cp vendor_boot.img unpacked/ 2>/dev/null || true
          
          ls -lah unpacked/

      - name: Upload artifacts
        if: github.event.inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-vendor-boot-${{ github.run_number }}
          path: unpacked/
          retention-days: 30
          if-no-files-found: warn
          
