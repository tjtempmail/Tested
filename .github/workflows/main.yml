name: Download Android GSI and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly check (Sundays at midnight UTC)

env:
  FILENAME: aosp_arm64-exp-CP21.260206.011-14911669-04f2dce1.zip
  DOWNLOAD_URL: https://dl.google.com/developers/android/cinnamonbun/images/gsi/aosp_arm64-exp-CP21.260206.011-14911669-04f2dce1.zip

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android GSI
        run: |
          echo "Downloading Android 17 GSI (Cinnamonbun)..."
          echo "URL: ${{ env.DOWNLOAD_URL }}"
          
          # Download with curl (follow redirects, resume support, progress bar)
          curl -L -C - -o "${{ env.FILENAME }}" "${{ env.DOWNLOAD_URL }}" --progress-bar
          
          # Verify file was downloaded
          if [ ! -f "${{ env.FILENAME }}" ]; then
            echo "Error: Download failed"
            exit 1
          fi
          
          # Get file size
          FILE_SIZE=$(du -h "${{ env.FILENAME }}" | cut -f1)
          echo "Downloaded successfully: ${{ env.FILENAME }} ($FILE_SIZE)"
          
          # Calculate SHA256 checksum
          echo "Calculating SHA256 checksum..."
          sha256sum "${{ env.FILENAME }}" > checksum.txt
          cat checksum.txt

      - name: Generate Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          # Android 17 GSI (Cinnamonbun) - Experimental Build
          
          **Build:** CP21.260206.011  
          **Date:** February 2025  
          **Architecture:** ARM64  
          **Type:** AOSP Experimental GSI (Generic System Image)
          
          ## File Details
          - **Filename:** `${{ env.FILENAME }}`
          - **Source:** Google Developers CDN
          - **Codename:** Cinnamonbun (Android 17)
          
          ## Description
          This is an experimental Android 17 Generic System Image (GSI) for ARM64 devices. 
          GSIs are used for app testing and validation on Treble-compliant devices.
          
          ## Requirements
          - Device must support Treble (launched with Android 9+)
          - Unlocked bootloader
          - ARM64 architecture
          
          ## Installation Warning
          ⚠️ **Experimental Build**: This is a developer preview and may contain bugs.
          Always backup your data before flashing. Not recommended for daily driver use.
          
          ## Checksum
          SHA256 checksum is provided in the release assets for verification.
          
          ## Source
          Downloaded from: `${{ env.DOWNLOAD_URL }}`
          
          ---
          *Automatically downloaded and published via GitHub Actions*
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-17-gsi-${{ github.run_number }}
          name: "Android 17 GSI - CP21.260206.011 (Build ${{ github.run_number }})"
          body_path: release_notes.md
          files: |
            ${{ env.FILENAME }}
            checksum.txt
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
