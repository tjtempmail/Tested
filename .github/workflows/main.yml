name: Dumpyara and Device Tree Generation

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Direct URL to firmware ZIP file'
        required: true
        type: string

jobs:
  dumpyara:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv git curl wget unzip

      - name: Setup and run dumpyara
        run: |
          mkdir ~/dumpyara
          cd ~/dumpyara
          git clone https://github.com/AndroidDumps/dumpyara.git
          cd dumpyara
          ./setup.sh
          wget -O firmware.zip "${{ github.event.inputs.firmware_url }}"
          ./dumpyara.sh firmware.zip

      - name: Find working directory and generate device tree
        run: |
          pip3 install aospdtgen
          mkdir ~/dumpyara/deviceTree
          
          # Find the actual working subdirectory (e.g., ~/dumpyara/working/Infinix-Hot-10i-X659B-*)
          WORKING_DIR=$(find ~/dumpyara/working -maxdepth 1 -type d | tail -1)
          echo "Found working directory: $WORKING_DIR"
          
          aospdtgen "$WORKING_DIR" -o ~/dumpyara/deviceTree

      - name: Fix extract-files.py and run it
        run: |
          cd ~/dumpyara/deviceTree
          
          # Get codename from dumpyara output directory name
          CODENAME=$(basename $(find ~/dumpyara/working -maxdepth 1 -type d | tail -1) | grep -oP '(?<=-)[^-]+$' || echo "X659B")
          echo "Using codename: $CODENAME"
          
          # Replace FULL-64 with actual codename
          find . -type f \( -name "*.py" -o -name "*.sh" -o -name "*.mk" -o -name "Android.bp" \) -exec sed -i "s/FULL-64/${CODENAME}/g" {} \;
          
          # Clone extract-utils if needed
          git clone https://github.com/LineageOS/android_tools_extract-utils.git ~/extract-utils 2>/dev/null || true
          
          # Run extract-files.py
          PYTHONPATH=~/extract-utils python3 extract-files.py "$(find ~/dumpyara/working -maxdepth 1 -type d | tail -1)"

      - name: Upload device tree
        uses: actions/upload-artifact@v4
        with:
          name: device-tree
          path: ~/dumpyara/deviceTree/

      - name: Upload vendor blobs
        uses: actions/upload-artifact@v4
        with:
          name: vendor-blobs
          path: ~/dumpyara/deviceTree/vendor/
          
